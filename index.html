<!DOCTYPE html>
<html>
<head>
<title>🎮 Portal PRO</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #111;
  color: white;
}

.container {
  display: flex;
  height: 100vh;
}

.sidebar {
  width: 120px;
  background: #000;
  padding: 10px;
  transition: 0.3s;
}

.sidebar.hidden {
  width: 0;
  padding: 0;
  overflow: hidden;
}

.game-btn {
  display: block;
  margin: 10px 0;
  padding: 10px;
  background: #222;
  border: none;
  color: white;
  cursor: pointer;
  width: 100%;
}

.game-btn:hover {
  background: #444;
}

.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.header {
  background: #000;
  padding: 10px;
  text-align: center;
}

.content {
  display: flex;
  flex: 1;
}

.game {
  flex: 2;
  text-align: center;
  position: relative;
}

iframe {
  width: 95%;
  height: 100%;
  border: none;
}

/* AJEDREZ */
#chessContainer {
  display: none;
  text-align: center;
}

#board {
  margin-top: 20px;
  border: 2px solid white;
}

.chat {
  width: 350px;
  background: #111;
  border-left: 2px solid #222;
}

.toggle-btn {
  position: absolute;
  top: 10px;
  left: 130px;
  background: #0084EF;
  border: none;
  color: white;
  padding: 5px 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<button class="toggle-btn" onclick="toggleMenu()">⬅️</button>

<div class="container">

<div class="sidebar" id="menu">

<button class="game-btn" onclick="cambiarJuego('https://scratch.mit.edu/projects/10128407/embed')">🎮 1</button>
<button class="game-btn" onclick="cambiarJuego('https://scratch.mit.edu/projects/34459990/embed')">🎮 2</button>
<button class="game-btn" onclick="cambiarJuego('https://scratch.mit.edu/projects/165126/embed')">🎮 3</button>
<button class="game-btn" onclick="cambiarJuego('https://slither.io')">🐍</button>

<!-- NUEVO -->
<button class="game-btn" onclick="abrirAjedrez()">♟️ Ajedrez</button>

</div>

<div class="main">

<div class="header">
<h1>🔥 PORTAL GAMER 🔥</h1>
</div>

<div class="content">

<div class="game">

<!-- iframe normal -->
<iframe id="gameFrame"
src="https://scratch.mit.edu/projects/10128407/embed">
</iframe>

<!-- AJEDREZ -->
<div id="chessContainer">
<input id="room" placeholder="Sala (ej: 123)">
<button onclick="join()">Entrar</button>

<canvas id="board" width="400" height="400"></canvas>
</div>

</div>

<div class="chat">
<iframe src="https://losfachasxd.chatango.com/"
width="100%" height="100%">
</iframe>
</div>

</div>

</div>

</div>

<script>
// 🔥 CONFIG FIREBASE (TUYA)
const firebaseConfig = {
  apiKey: "AIzaSyBYJFm9zy8vRv4F0Ets_3NLtUJ2zuj27BE",
  authDomain: "ajedrez-online-3c037.firebaseapp.com",
  databaseURL: "https://ajedrez-online-3c037-default-rtdb.firebaseio.com",
  projectId: "ajedrez-online-3c037",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let room = "";

// cambiar juegos
function cambiarJuego(url) {
  document.getElementById("gameFrame").style.display = "block";
  document.getElementById("chessContainer").style.display = "none";
  document.getElementById("gameFrame").src = url;
}

// abrir ajedrez
function abrirAjedrez() {
  document.getElementById("gameFrame").style.display = "none";
  document.getElementById("chessContainer").style.display = "block";
}

// menú
function toggleMenu() {
  document.getElementById("menu").classList.toggle("hidden");
}

// conectar sala
function join() {
  room = document.getElementById("room").value;

  db.ref("rooms/" + room).on("value", (snap) => {
    if (snap.val()) {
      drawBoard();
    }
  });
}

// dibujar tablero
const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");
const size = 50;

function drawBoard() {
  for (let y = 0; y < 8; y++) {
    for (let x = 0; x < 8; x++) {
      ctx.fillStyle = (x + y) % 2 === 0 ? "#eee" : "#555";
      ctx.fillRect(x * size, y * size, size, size);
    }
  }
}

drawBoard();
</script>

</body>
</html>
