<!DOCTYPE html>
<html>
<head>
  <title>🎮 Portal PRO</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #111;
  color: white;
}

.container {
  display: flex;
}

/* menú izquierda */
.sidebar {
  width: 120px;
  background: #000;
  padding: 10px;
}

.game-btn {
  display: block;
  margin: 10px 0;
  padding: 10px;
  background: #222;
  border: none;
  color: white;
  cursor: pointer;
  width: 100%;
}

.game-btn:hover {
  background: #444;
}

/* pantalla */
.main {
  flex: 1;
  text-align: center;
}

iframe {
  width: 90%;
  height: 600px;
  border: none;
  margin-top: 20px;
}
</style>

</head>

<body>

<div class="container">

  <!-- MENÚ -->
  <div class="sidebar">
    <button class="game-btn" onclick="cambiarJuego('https://scratch.mit.edu/projects/10128407/embed')">🎮 1</button>
    <button class="game-btn" onclick="cambiarJuego('https://scratch.mit.edu/projects/34459990/embed')">🎮 2</button>
    <button class="game-btn" onclick="cambiarJuego('https://scratch.mit.edu/projects/165126/embed')">🎮 3</button>
    <button class="game-btn" onclick="cambiarJuego('https://slither.io')">🐍</button>
  </div>

  <!-- PANTALLA -->
  <div class="main">
    <h1>🔥 PORTAL GAMER 🔥</h1>

    <iframe id="gameFrame"
    src="https://scratch.mit.edu/projects/10128407/embed">
    </iframe>

  </div>

</div>

<script>
function cambiarJuego(url) {
  document.getElementById("gameFrame").src = url;
}
</script>

</body>
</html>
