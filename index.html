<!DOCTYPE html>
<html>
<head>
  <title>🎮 Portal PRO</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #111;
  color: white;
}

/* contenedor */
.container {
  display: flex;
  height: 100vh;
}

/* sidebar */
.sidebar {
  width: 120px;
  background: #000;
  padding: 10px;
  transition: 0.3s;
}

.sidebar.hidden {
  width: 0;
  padding: 0;
  overflow: hidden;
}

.game-btn {
  display: block;
  margin: 10px 0;
  padding: 10px;
  background: #222;
  border: none;
  color: white;
  cursor: pointer;
  width: 100%;
}

.game-btn:hover {
  background: #444;
}

/* contenido principal */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* arriba título */
.header {
  background: #000;
  padding: 10px;
  text-align: center;
}

/* zona juego + chat */
.content {
  display: flex;
  flex: 1;
}

/* juego */
.game {
  flex: 2;
  text-align: center;
}

iframe {
  width: 95%;
  height: 100%;
  border: none;
}

/* chat */
.chat {
  width: 350px;
  background: #111;
  border-left: 2px solid #222;
}

/* botón toggle */
.toggle-btn {
  position: absolute;
  top: 10px;
  left: 130px;
  background: #0084EF;
  border: none;
  color: white;
  padding: 5px 10px;
  cursor: pointer;
}
</style>

</head>

<body>

<button class="toggle-btn" onclick="toggleMenu()">⬅️</button>

<div class="container">

  <!-- MENU -->
  <div class="sidebar" id="menu">

    <button class="game-btn" onclick="cambiarJuego('https://scratch.mit.edu/projects/10128407/embed')">🎮 1</button>
    <button class="game-btn" onclick="cambiarJuego('https://scratch.mit.edu/projects/34459990/embed')">🎮 2</button>
    <button class="game-btn" onclick="cambiarJuego('https://scratch.mit.edu/projects/165126/embed')">🎮 3</button>
    <button class="game-btn" onclick="cambiarJuego('https://slither.io')">🐍</button>

  </div>

  <!-- CONTENIDO -->
  <div class="main">

    <div class="header">
      <h1>🔥 PORTAL GAMER 🔥</h1>
    </div>

    <div class="content">

      <!-- JUEGO -->
      <div class="game">
        <iframe id="gameFrame"
        src="https://scratch.mit.edu/projects/10128407/embed">
        </iframe>
      </div>

      <!-- CHAT -->
      <div class="chat">
        <iframe src="https://losfachasxd.chatango.com/"
        width="100%" height="100%">
        </iframe>
      </div>

    </div>

  </div>

</div>

<script>
function cambiarJuego(url) {
  document.getElementById("gameFrame").src = url;
}

function toggleMenu() {
  const menu = document.getElementById("menu");
  menu.classList.toggle("hidden");
}
</script>

</body>
</html>
