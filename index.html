<!DOCTYPE html>
<html>
<head>
<title>🎮 Portal PRO</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body { margin:0; font-family:sans-serif; background:#111; color:white; }
.container { display:flex; height:100vh; }
.sidebar { width:120px; background:#000; padding:10px; }
.game-btn { display:block; margin:10px 0; padding:10px; background:#222; border:none; color:white; cursor:pointer; width:100%; }
.main { flex:1; display:flex; flex-direction:column; }
.header { background:#000; padding:10px; text-align:center; }
.content { display:flex; flex:1; }
.game { flex:2; text-align:center; }
.chat { width:350px; }
canvas { border:2px solid white; margin-top:10px; }
</style>
</head>

<body>

<div class="container">

<div class="sidebar">
<button class="game-btn" onclick="abrirAjedrez()">♟️ Ajedrez</button>
</div>

<div class="main">

<div class="header"><h1>♟️ AJEDREZ ONLINE</h1></div>

<div class="content">

<div class="game">
<input id="room" placeholder="Sala (ej: 123)">
<button onclick="join()">Entrar</button>
<canvas id="board" width="400" height="400"></canvas>
</div>

<div class="chat">
<iframe src="https://losfachasxd.chatango.com/" width="100%" height="100%"></iframe>
</div>

</div>
</div>
</div>

<script>
// 🔥 Firebase
const firebaseConfig = {
  apiKey: "AIzaSyBYJFm9zy8vRv4F0Ets_3NLtUJ2zuj27BE",
  authDomain: "ajedrez-online-3c037.firebaseapp.com",
  databaseURL: "https://ajedrez-online-3c037-default-rtdb.firebaseio.com",
  projectId: "ajedrez-online-3c037"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let room = "";
let player = "";
let turn = "white";

// tablero inicial
let board = [
["r","n","b","q","k","b","n","r"],
["p","p","p","p","p","p","p","p"],
["","","","","","","",""],
["","","","","","","",""],
["","","","","","","",""],
["","","","","","","",""],
["P","P","P","P","P","P","P","P"],
["R","N","B","Q","K","B","N","R"]
];

const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");
const size = 50;

let selected = null;

// unir sala
function join(){
  room = document.getElementById("room").value;

  const ref = db.ref("rooms/" + room);

  ref.once("value", snap => {
    if(!snap.exists()){
      player = "white";
      ref.set({ board, turn });
    } else {
      player = "black";
    }
  });

  ref.on("value", snap => {
    const data = snap.val();
    if(data){
      board = data.board;
      turn = data.turn;
      draw();
    }
  });
}

// dibujar
function draw(){
  ctx.clearRect(0,0,400,400);

  for(let y=0;y<8;y++){
    for(let x=0;x<8;x++){
      ctx.fillStyle = (x+y)%2 ? "#555" : "#eee";
      ctx.fillRect(x*size,y*size,size,size);

      let piece = board[y][x];
      if(piece){
        ctx.fillStyle = piece === piece.toUpperCase() ? "white" : "black";
        ctx.fillText(piece, x*size+20, y*size+30);
      }
    }
  }
}

// click mover
canvas.onclick = (e)=>{
  const x = Math.floor(e.offsetX/size);
  const y = Math.floor(e.offsetY/size);

  if(!selected){
    selected = {x,y};
  } else {
    move(selected.x, selected.y, x, y);
    selected = null;
  }
};

function move(x1,y1,x2,y2){
  if(turn !== player) return;

  board[y2][x2] = board[y1][x1];
  board[y1][x1] = "";

  turn = turn === "white" ? "black" : "white";

  db.ref("rooms/"+room).set({ board, turn });
}

draw();
</script>

</body>
</html>
