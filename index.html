<!DOCTYPE html>
<html>
<head>
<title>🎮 Portal PRO</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body { margin:0; font-family:sans-serif; background:#111; color:white; }
.container { display:flex; height:100vh; }
.sidebar { width:120px; background:#000; padding:10px; }
.game-btn { display:block; margin:10px 0; padding:10px; background:#222; border:none; color:white; cursor:pointer; width:100%; }
.main { flex:1; display:flex; flex-direction:column; }
.header { background:#000; padding:10px; text-align:center; }
.content { display:flex; flex:1; }
.game { flex:2; text-align:center; position:relative; }
.chat { width:350px; }
canvas { border:2px solid white; margin-top:10px; touch-action: manipulation; }

/* contador */
#countdown {
  position:absolute;
  top:40%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:100px;
  color:white;
  text-shadow:3px 3px black;
  display:none;
}
</style>
</head>

<body>

<div class="container">

<div class="sidebar">
<button class="game-btn" onclick="mostrarIframe()">🎮 Juegos</button>
<button class="game-btn" onclick="mostrarAjedrez()">♟️ Ajedrez</button>
</div>

<div class="main">

<div class="header"><h1>🔥 PORTAL GAMER 🔥</h1></div>

<div class="content">

<div class="game">

<!-- JUEGOS -->
<iframe id="gameFrame"
src="https://scratch.mit.edu/projects/10128407/embed"
width="100%" height="100%"></iframe>

<!-- AJEDREZ -->
<div id="chessUI" style="display:none;">
<input id="room" placeholder="Sala (ej: 123)">
<button onclick="join()">Unirse</button>
<canvas id="board" width="320" height="320"></canvas>
</div>

<div id="countdown"></div>

</div>

<div class="chat">
<iframe src="https://losfachasxd.chatango.com/" width="100%" height="100%"></iframe>
</div>

</div>
</div>
</div>

<script>
// Firebase
const firebaseConfig = {
  apiKey: "AIzaSyBYJFm9zy8vRv4F0Ets_3NLtUJ2zuj27BE",
  authDomain: "ajedrez-online-3c037.firebaseapp.com",
  databaseURL: "https://ajedrez-online-3c037-default-rtdb.firebaseio.com",
  projectId: "ajedrez-online-3c037"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let room="", player="", turn="white";

// tablero
let board=[
["♜","♞","♝","♛","♚","♝","♞","♜"],
["♟","♟","♟","♟","♟","♟","♟","♟"],
["","","","","","","",""],
["","","","","","","",""],
["","","","","","","",""],
["","","","","","","",""],
["♙","♙","♙","♙","♙","♙","♙","♙"],
["♖","♘","♗","♕","♔","♗","♘","♖"]
];

const canvas=document.getElementById("board");
const ctx=canvas.getContext("2d");
const size=40;
let selected=null;

// UI
function mostrarAjedrez(){
  document.getElementById("gameFrame").style.display="none";
  document.getElementById("chessUI").style.display="block";
}
function mostrarIframe(){
  document.getElementById("gameFrame").style.display="block";
  document.getElementById("chessUI").style.display="none";
}

// UNIR SALA
function join(){
  room=document.getElementById("room").value;
  const ref=db.ref("rooms/"+room);

  ref.once("value").then(snap=>{
    if(!snap.exists()){
      player="white";
      ref.set({board,turn,players:1,start:false});
    }else{
      player="black";
      ref.update({players:2,start:true});
    }
  });

  ref.on("value",snap=>{
    let data=snap.val();
    if(!data)return;

    board=data.board;
    turn=data.turn;

    if(data.start){
      iniciarCuenta();
    }

    draw();
  });
}

// contador
function iniciarCuenta(){
  let c=3;
  let el=document.getElementById("countdown");
  el.style.display="block";

  let interval=setInterval(()=>{
    el.innerText=c;
    c--;
    if(c<0){
      clearInterval(interval);
      el.style.display="none";
    }
  },1000);
}

// dibujar
function draw(){
  ctx.clearRect(0,0,320,320);

  for(let y=0;y<8;y++){
    for(let x=0;x<8;x++){
      ctx.fillStyle=(x+y)%2?"#444":"#eee";
      ctx.fillRect(x*size,y*size,size,size);

      let p=board[y][x];
      if(p){
        ctx.font="30px Arial";
        ctx.fillStyle=p.match(/[♙♖♘♗♕♔]/)?"white":"black";
        ctx.fillText(p,x*size+6,y*size+30);
      }
    }
  }
}

// mover
canvas.onclick=e=>{
  let x=Math.floor(e.offsetX/size);
  let y=Math.floor(e.offsetY/size);

  if(turn!==player)return;

  if(!selected){
    selected={x,y};
  }else{
    board[y][x]=board[selected.y][selected.x];
    board[selected.y][selected.x]="";
    selected=null;

    turn=turn==="white"?"black":"white";
    db.ref("rooms/"+room).set({board,turn,players:2,start:true});
  }
};

draw();
</script>

</body>
</html>
