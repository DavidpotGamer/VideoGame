<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>🎮 FACHA GAMES</title>
    <style>
        :root {
            --primary: #0084EF;
            --secondary: #00c853;
            --bg-dark: #0a0a0a;
            --sidebar-width: 150px;
        }

        body { 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg-dark); 
            color: white; 
            overflow: hidden; /* Prevents double scrollbars */
        }

        .container { display: flex; height: 100vh; }

        /* SIDEBAR */
        .sidebar {
            width: var(--sidebar-width);
            background: #000;
            padding: 15px;
            transition: all 0.3s ease;
            border-right: 2px solid #222;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sidebar.hidden {
            width: 0;
            padding: 0;
            border: none;
            overflow: hidden;
        }

        /* BUTTONS */
        .game-btn {
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.2s;
            text-align: left;
            font-weight: bold;
        }

        .game-btn:hover {
            background: var(--primary);
            box-shadow: 0 0 15px var(--primary);
            transform: scale(1.05);
        }

        .toggle-ctrl {
            position: fixed;
            z-index: 100;
            background: #222;
            color: white;
            border: 1px solid #444;
            padding: 8px;
            cursor: pointer;
            border-radius: 5px;
        }

        #toggleBtn { top: 10px; left: 10px; }
        #chatToggle { top: 10px; right: 10px; background: var(--secondary); }

        /* MAIN AREA */
        .main { flex: 1; display: flex; flex-direction: column; position: relative; }
        
        .header { 
            background: linear-gradient(90deg, #000, #111);
            padding: 15px; 
            text-align: center;
            border-bottom: 2px solid #222;
        }

        .header h1 { margin: 0; font-size: 1.5rem; letter-spacing: 2px; }

        .content { display: flex; flex: 1; overflow: hidden; }

        .game { flex: 1; background: #000; }

        .chat { 
            width: 300px; 
            transition: 0.3s; 
            border-left: 2px solid #222;
            background: #000;
        }

        .chat.hidden { width: 0; border: none; }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<button id="toggleBtn" class="toggle-ctrl" onclick="toggleMenu()">☰</button>
<button id="chatToggle" class="toggle-ctrl" onclick="toggleChat()">💬 Chat</button>

<div class="container">
    
    <div class="sidebar" id="menu">
        <div style="height: 50px;"></div> <button class="game-btn" onclick="cambiarJuego('https://www.crazygames.com/embed/master-chess')">♟️ Ajedrez</button>
        <button class="game-btn" onclick="cambiarJuego('https://rocketgoal.io/')">⚽ RocketGoal</button>
        <button class="game-btn" onclick="window.open('https://slither.io', '_blank')">🐍 Slither (New Tab)</button>
    </div>

    <div class="main">
        <div class="header">
            <h1>🔥 FACHA GAMES 🔥</h1>
        </div>

        <div class="content">
            <div class="game">
                <iframe id="gameFrame" src="https://www.crazygames.com/embed/master-chess" allowfullscreen></iframe>
            </div>

            <div class="chat" id="chat">
                <iframe src="https://losfachasxd.chatango.com/"></iframe>
            </div>
        </div>
    </div>
</div>

<script>
    function cambiarJuego(url) {
        document.getElementById("gameFrame").src = url;
    }

    function toggleMenu() {
        const menu = document.getElementById("menu");
        menu.classList.toggle("hidden");
    }

    function toggleChat() {
        const chat = document.getElementById("chat");
        chat.classList.toggle("hidden");
    }
</script>

</body>
</html>
