<!DOCTYPE html>
<html>
<head>
<title>🎮 Portal PRO</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body { margin:0; font-family:sans-serif; background:#111; color:white; }
.container { display:flex; height:100vh; }
.sidebar { width:120px; background:#000; padding:10px; }
.game-btn { display:block; margin:10px 0; padding:10px; background:#222; border:none; color:white; cursor:pointer; width:100%; }
.main { flex:1; display:flex; flex-direction:column; }
.header { background:#000; padding:10px; text-align:center; }
.content { display:flex; flex:1; }
.game { flex:2; text-align:center; }
.chat { width:350px; }
canvas { border:2px solid white; margin-top:10px; touch-action: manipulation; }
</style>
</head>

<body>

<div class="container">

<div class="sidebar">
<button class="game-btn">♟️ Ajedrez</button>
</div>

<div class="main">

<div class="header"><h1>♟️ AJEDREZ ONLINE</h1></div>

<div class="content">

<div class="game">
<input id="room" placeholder="Sala (ej: 123)">
<button onclick="join()">Entrar</button>
<canvas id="board" width="320" height="320"></canvas>
</div>

<div class="chat">
<iframe src="https://losfachasxd.chatango.com/" width="100%" height="100%"></iframe>
</div>

</div>
</div>
</div>

<script>
// 🔥 Firebase
const firebaseConfig = {
  apiKey: "AIzaSyBYJFm9zy8vRv4F0Ets_3NLtUJ2zuj27BE",
  authDomain: "ajedrez-online-3c037.firebaseapp.com",
  databaseURL: "https://ajedrez-online-3c037-default-rtdb.firebaseio.com",
  projectId: "ajedrez-online-3c037"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let room = "";
let player = "";
let turn = "white";

// ♟️ piezas reales
let board = [
["♜","♞","♝","♛","♚","♝","♞","♜"],
["♟","♟","♟","♟","♟","♟","♟","♟"],
["","","","","","","",""],
["","","","","","","",""],
["","","","","","","",""],
["","","","","","","",""],
["♙","♙","♙","♙","♙","♙","♙","♙"],
["♖","♘","♗","♕","♔","♗","♘","♖"]
];

const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");
const size = 40;

let selected = null;

// 🔗 UNIR SALA (ARREGLADO)
function join(){
  room = document.getElementById("room").value;
  const ref = db.ref("rooms/" + room);

  ref.get().then(snap=>{
    if(!snap.exists()){
      player="white";
      ref.set({board, turn});
    } else {
      player="black";
    }
  });

  ref.on("value", snap=>{
    let data = snap.val();
    if(data){
      board = data.board;
      turn = data.turn;
      draw();
    }
  });
}

// 🎨 DIBUJAR
function draw(){
  ctx.clearRect(0,0,320,320);

  for(let y=0;y<8;y++){
    for(let x=0;x<8;x++){
      ctx.fillStyle = (x+y)%2 ? "#444" : "#eee";
      ctx.fillRect(x*size,y*size,size,size);

      let piece = board[y][x];
      if(piece){
        ctx.font="30px Arial";
        ctx.fillStyle = piece.match(/[♙♖♘♗♕♔]/) ? "white" : "black";
        ctx.fillText(piece, x*size+6, y*size+30);
      }
    }
  }
}

// 👆 CLICK + TOUCH (ARREGLADO)
canvas.addEventListener("click", e=>{
  let x=Math.floor(e.offsetX/size);
  let y=Math.floor(e.offsetY/size);
  handleMove(x,y);
});

canvas.addEventListener("touchstart", e=>{
  let rect=canvas.getBoundingClientRect();
  let x=Math.floor((e.touches[0].clientX-rect.left)/size);
  let y=Math.floor((e.touches[0].clientY-rect.top)/size);
  handleMove(x,y);
});

// mover
function handleMove(x,y){
  if(turn!==player) return;

  if(!selected){
    selected={x,y};
  } else {
    board[y][x]=board[selected.y][selected.x];
    board[selected.y][selected.x]="";
    selected=null;

    turn = turn==="white"?"black":"white";

    db.ref("rooms/"+room).set({board,turn});
  }
}

draw();
</script>

</body>
</html>
