<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 FACHA GAMES</title>

    <style>

        :root {
            --primary: #0084EF;
            --secondary: #00c853;
            --bg-dark: #0a0a0a;
            --card-bg: #1a1a1a;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg-dark);
            color: white;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* BOTONES */

        .toggle-ctrl {
            position: fixed;
            z-index: 100;
            background: #222;
            color: white;
            border: 1px solid #444;
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.2s;
            font-size: 14px;
        }

        .toggle-ctrl:hover {
            transform: scale(1.05);
        }

        #homeBtn {
            top: 10px;
            left: 10px;
            background: var(--primary);
        }

        #chatToggle {
            top: 10px;
            right: 10px;
            background: var(--secondary);
        }

        /* MAIN */

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .header {
            background: #000;
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid #222;
        }

        .header h1 {
            margin: 0;
            font-size: 1.5rem;
            letter-spacing: 3px;
        }

        .content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* JUEGOS */

        .game-container {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        #lobby {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;

            background: var(--bg-dark);

            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));

            gap: 20px;
            padding: 40px;
            box-sizing: border-box;

            z-index: 10;
            overflow-y: auto;
        }

        .game-card {
            background: var(--card-bg);
            border: 3px solid #333;
            border-radius: 15px;

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;

            cursor: pointer;
            transition: 0.3s;

            aspect-ratio: 1 / 1;
            text-align: center;
        }

        .game-card:hover {
            border-color: var(--primary);
            transform: translateY(-5px);
            box-shadow: 0 0 20px var(--primary);
        }

        .game-icon {
            width: 80px;
            height: 80px;
            object-fit: contain;
            margin-bottom: 10px;
        }

        .game-card span {
            font-size: 4rem;
            margin-bottom: 10px;
        }

        .game-card h3 {
            margin: 0;
            font-size: 1.2rem;
        }

        /* IFRAME */

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }

        iframe.active {
            display: block;
        }

        /* CHAT */

        .chat {
            width: 350px;
            transition: 0.3s;
            border-left: 2px solid #222;
            background: #000;
            overflow: hidden;
        }

        .chat.hidden {
            width: 0;
            border: none;
        }

    </style>

</head>

<body>

    <!-- BOTONES -->

    <button id="homeBtn" class="toggle-ctrl" onclick="irAlMenu()">🏠 MENU</button>

    <button id="chatToggle" class="toggle-ctrl" onclick="toggleChat()">💬 CHAT</button>

    <div class="container">

        <div class="main">

            <!-- TITULO -->

            <div class="header">
                <h1>🔥 FACHA GAMES 🔥</h1>
            </div>

            <div class="content">

                <!-- JUEGOS -->

                <div class="game-container">

                    <div id="lobby">

                        <!-- CHESS -->

                        <div class="game-card" onclick="cargarJuego('https://papergames.io/en/chess')">
                            <span>♟️</span>
                            <h3>Classic Games</h3>
                        </div>

                        <!-- ROCKETGOAL -->

                        <div class="game-card" onclick="cargarJuego('https://rocketgoal.io/')">
                            <span>⚽</span>
                            <h3>RocketGoal</h3>
                        </div>

                        <!-- SNAKE -->

                        <div class="game-card" onclick="cargarJuego('https://dnrweqffuwjtx.cloudfront.net/snaker-io/')">
                            <span>🐍</span>
                            <h3>Snake Game</h3>
                        </div>

                        <!-- MOTOS -->

                        <div class="game-card" onclick="cargarJuego('https://classroom6x.github.io/go/class-458.html')">
                            <span>🏍️</span>
                            <h3>Moto Games</h3>
                        </div>

                        <!-- GOOGLE SNAKE -->

                        <div class="game-card" onclick="cargarJuego('https://www.snake.es/')">
                            <span>🎮</span>
                            <h3>Snake Google</h3>
                        </div>

                        <!-- FLAPPY BIRD -->

                        <div class="game-card" onclick="cargarJuego('https://flappybirdonline.gitlab.io/')">

                            <img src="flappy bird.png" class="game-icon">

                            <h3>Flappy Bird</h3>

                        </div>

                        <!-- DRIFT BOSS -->

                        <div class="game-card" onclick="cargarJuego('https://www.mathplayground.com/pg_drift_boss.html')">
                            <span>🚗</span>
                            <h3>Drift Boss</h3>
                        </div>

                        <!-- GARTIC PHONE -->

                        <div class="game-card" onclick="cargarJuego('https://garticphone.com/es')">
                            <span>🎨</span>
                            <h3>Gartic Phone</h3>
                        </div>

                        <!-- MINECRAFT -->

                        <div class="game-card" onclick="cargarJuego('https://bloxdio2.com/')">
                            <span>🟩</span>
                            <h3>Minecraft</h3>
                        </div>

                        <!-- SUBWAY SURFERS -->

                        <div class="game-card" onclick="cargarJuego('https://gamesgo.net/world-tour-venice-subway-surfers/')">
                            <span>🚆</span>
                            <h3>Subway Surfers</h3>
                        </div>

                        <!-- POKI -->

                        <div class="game-card" onclick="cargarJuego('https://poki.homes/es')">
                            <span>🕹️</span>
                            <h3>Poki Games</h3>
                        </div>

                    </div>

                    <!-- IFRAME -->

                    <iframe
                        id="gameFrame"
                        src=""
                        allowfullscreen
                        sandbox="allow-forms allow-scripts allow-same-origin allow-popups">
                    </iframe>

                </div>

                <!-- CHAT -->

                <div class="chat" id="chat">

                    <iframe
                        src="https://chatsitopro.chatango.com/"
                        style="width:100%; height:100%; border:none; display:block;">
                    </iframe>

                </div>

            </div>

        </div>

    </div>

    <script>

        const lobby = document.getElementById('lobby');
        const frame = document.getElementById('gameFrame');

        function cargarJuego(url) {

            lobby.style.display = 'none';

            frame.src = url;

            frame.classList.add('active');
        }

        function irAlMenu() {

            frame.src = "";

            frame.classList.remove('active');

            lobby.style.display = 'grid';
        }

        function toggleChat() {

            const chat = document.getElementById("chat");

            chat.classList.toggle("hidden");
        }

    </script>

</body>

</html>
