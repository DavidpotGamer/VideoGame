
<!DOCTYPE html>
<html>
<head>
<title>🎮 Portal PRO</title>

<style>
body { margin:0; font-family:sans-serif; background:#111; color:white; }

.container { display:flex; height:100vh; }

/* MENU */
.sidebar {
  width:120px;
  background:#000;
  padding:10px;
  transition:0.3s;
}

.sidebar.hidden {
  width:0;
  padding:0;
  overflow:hidden;
}

.game-btn {
  display:block;
  margin:10px 0;
  padding:10px;
  background:#222;
  border:none;
  color:white;
  cursor:pointer;
  width:100%;
}

/* BOTON FLECHA */
#toggleBtn{
  position:absolute;
  top:10px;
  left:120px;
  background:#0084EF;
  color:white;
  border:none;
  padding:5px 10px;
  cursor:pointer;
  z-index:10;
}

/* CONTENIDO */
.main { flex:1; display:flex; flex-direction:column; }
.header { background:#000; padding:10px; text-align:center; }
.content { display:flex; flex:1; }

.game { flex:2; text-align:center; }
.chat { width:350px; }

iframe {
  width:100%;
  height:100%;
  border:none;
}
</style>
</head>

<body>

<button id="toggleBtn" onclick="toggleMenu()">⬅️</button>

<div class="container">

<div class="sidebar" id="menu">

<button class="game-btn" onclick="cambiarJuego('https://scratch.mit.edu/projects/10128407/embed')">🎮 Juego 1</button>
<button class="game-btn" onclick="cambiarJuego('https://scratch.mit.edu/projects/34459990/embed')">🎮 Juego 2</button>
<button class="game-btn" onclick="cambiarJuego('https://scratch.mit.edu/projects/165126/embed')">🎮 Juego 3</button>
<button class="game-btn" onclick="cambiarJuego('https://slither.io')">🐍 Slither</button>

<button class="game-btn" onclick="abrirRocket()">⚽ RocketGoal</button>

</div>

<div class="main">

<div class="header">
<h1>🔥 PORTAL GAMER 🔥</h1>
</div>

<div class="content">

<div class="game">
<iframe id="gameFrame"
src="https://scratch.mit.edu/projects/10128407/embed">
</iframe>
</div>

<div class="chat">
<iframe src="https://losfachasxd.chatango.com/"></iframe>
</div>

</div>

</div>

</div>

<script>
// cambiar juegos normales
function cambiarJuego(url){
  document.getElementById("gameFrame").src = url;
}

// RocketGoal (intenta iframe)
function abrirRocket(){
  document.getElementById("gameFrame").src = "https://rocketgoal.io/";
}

// menú toggle
function toggleMenu(){
  const menu=document.getElementById("menu");
  const btn=document.getElementById("toggleBtn");

  menu.classList.toggle("hidden");

  if(menu.classList.contains("hidden")){
    btn.innerText="➡️";
    btn.style.left="10px";
  }else{
    btn.innerText="⬅️";
    btn.style.left="120px";
  }
}
</script>

</body>
</html>
