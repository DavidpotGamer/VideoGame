<!DOCTYPE html>
<link rel="icon" href="Proyecto nuevo (22).png" type="image/png">

<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 FACHA GAMES</title>
    <style>
        :root {
            --primary: #0084EF;
            --secondary: #00c853;
            --bg-dark: #0a0a0a;
            --card-bg: #1a1a1a;
        }

        body { 
            margin: 0; 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg-dark); 
            color: white; 
            overflow: hidden; 
        }

        .container { display: flex; height: 100vh; }

        /* BOTONES FLOTANTES */
        .toggle-ctrl {
            position: fixed;
            z-index: 100;
            background: #222;
            color: white;
            border: 1px solid #444;
            padding: 10px;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }
        #homeBtn { top: 10px; left: 10px; background: var(--primary); }
        #chatToggle { top: 10px; right: 10px; background: var(--secondary); }

        /* AREAS PRINCIPALES */
        .main { flex: 1; display: flex; flex-direction: column; position: relative; }
        
        .header { 
            background: #000;
            padding: 15px; 
            text-align: center;
            border-bottom: 2px solid #222;
        }

        .header h1 { margin: 0; font-size: 1.5rem; letter-spacing: 3px; }

        .content { display: flex; flex: 1; overflow: hidden; }

        /* EL CONTENEDOR DEL JUEGO */
        .game-container { flex: 1; position: relative; display: flex; flex-direction: column; }
        
        /* EL MENÚ DE CUADRADOS (LOBBY) */
        #lobby {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 40px;
            box-sizing: border-box;
            z-index: 10;
            overflow-y: auto;
        }

        .game-card {
            background: var(--card-bg);
            border: 3px solid #333;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
            aspect-ratio: 1 / 1;
            text-align: center;
        }

        .game-card:hover {
            border-color: var(--primary);
            transform: translateY(-5px);
            box-shadow: 0 0 20px var(--primary);
        }

        .game-card span { font-size: 4rem; margin-bottom: 10px; }
        .game-card h3 { margin: 0; font-size: 1.2rem; }

        /* IFRAME */
        iframe { width: 100%; height: 100%; border: none; display: none; }
        iframe.active { display: block; }

        /* CHAT */
        .chat { 
            width: 350px; 
            transition: 0.3s; 
            border-left: 2px solid #222;
            background: #000;
        }
        .chat.hidden { width: 0; border: none; overflow: hidden; }

    </style>
</head>
<body>

<button id="homeBtn" class="toggle-ctrl" onclick="irAlMenu()">🏠 MENU</button>
<button id="chatToggle" class="toggle-ctrl" onclick="toggleChat()">💬 CHAT</button>

<div class="container">
    <div class="main">
        <div class="header">
            <h1>🔥 FACHAS JUEGOS 🔥</h1>
        </div>

        <div class="content">
            <div class="game-container">
                
                <div id="lobby">
                    <div class="game-card" onclick="cargarJuego('https://fortygames.io/games/chess-master/index.html')">
                        <span>♟️</span>
                        <h3>Ajedrez Maestro</h3>
                    </div>
                    
                    <div class="game-card" onclick="cargarJuego('https://rocketgoal.io/')">
                        <span>⚽</span>
                        <h3>RocketGoal</h3>
                    </div>

                    <div class="game-card" onclick="cargarJuego('https://dnrweqffuwjtx.cloudfront.net/snaker-io/')">
                        <span>🐍</span>
                        <h3>Snake Game</h3>
                    </div>

                    <div class="game-card" onclick="cargarJuego('https://classroom6x.github.io/go/class-458.html')">
                        <span>🏍️</span>
                        <h3>Moto Games</h3>
                    </div>
                </div>

                <iframe id="gameFrame" src="" allowfullscreen sandbox="allow-forms allow-scripts allow-same-origin allow-popups"></iframe>
            </div>

            <div class="chat" id="chat">
                <iframe src="https://losfachasxd.chatango.com/" style="display:block;"></iframe>
            </div>
        </div>
    </div>
</div>

<script>
    const lobby = document.getElementById('lobby');
    const frame = document.getElementById('gameFrame');

    function cargarJuego(url) {
        lobby.style.display = 'none'; // Esconde el menú de cuadrados
        frame.src = url;             // Carga el link
        frame.classList.add('active'); // Muestra el iframe
    }

    function irAlMenu() {
        frame.src = "";              // Limpia el juego
        frame.classList.remove('active'); // Esconde el iframe
        lobby.style.display = 'grid'; // Muestra el menú de cuadrados
    }

    function toggleChat() {
        const chat = document.getElementById("chat");
        chat.classList.toggle("hidden");
    }
</script>

</body>
</html>
