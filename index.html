<!DOCTYPE html>
<html>
<head>
<title>🎮FACHA GAME</title>

<style>
body { margin:0; font-family:sans-serif; background:#111; color:white; }

.container { display:flex; height:100vh; }

/* MENU */
.sidebar {
  width:120px;
  background:#000;
  padding:10px;
  transition:0.3s;
}

.sidebar.hidden {
  width:0;
  padding:0;
  overflow:hidden;
}

.game-btn {
  display:block;
  margin:10px 0;
  padding:10px;
  background:#222;
  border:none;
  color:white;
  cursor:pointer;
  width:100%;
}

/* BOTONES */
#toggleBtn{
  position:absolute;
  top:10px;
  left:120px;
  background:#0084EF;
  color:white;
  border:none;
  padding:5px 10px;
  cursor:pointer;
  z-index:10;
}

#chatToggle{
  position:absolute;
  top:50px;
  left:120px;
  background:#00c853;
  color:white;
  border:none;
  padding:5px 10px;
  cursor:pointer;
  z-index:10;
}

/* CONTENIDO */
.main { flex:1; display:flex; flex-direction:column; }
.header { background:#000; padding:10px; text-align:center; }
.content { display:flex; flex:1; }

.game { flex:2; }
.chat { width:350px; transition:0.3s; }

.chat.hidden {
  width:0;
  overflow:hidden;
}

iframe {
  width:100%;
  height:100%;
  border:none;
}
</style>
</head>

<body>

<button id="toggleBtn" onclick="toggleMenu()">⬅️</button>
<button id="chatToggle" onclick="toggleChat()">💬</button>

<div class="container">

<div class="sidebar" id="menu">

<button class="game-btn" onclick="abrirAjedrez()">♟️ Ajedrez</button>
<button class="game-btn" onclick="abrirRocket()">⚽ RocketGoal</button>
<button class="game-btn" onclick="abrirSlither()">🐍 Slither</button>

</div>

<div class="main">

<div class="header">
<h1>🔥 PORTAL GAMER 🔥</h1>
</div>

<div class="content">

<div class="game">
<iframe id="gameFrame"
src="https://www.crazygames.com/embed/master-chess">
</iframe>
</div>

<div class="chat" id="chat">
<iframe src="https://losfachasxd.chatango.com/"></iframe>
</div>

</div>

</div>

</div>

<script>

// AJEDREZ
function abrirAjedrez(){
  document.getElementById("gameFrame").src =
  "https://www.crazygames.com/embed/master-chess";
}

// RocketGoal
function abrirRocket(){
  document.getElementById("gameFrame").src =
  "https://rocketgoal.io/";
}

// Slither
function abrirSlither(){
  window.open("https://slither.io", "_blank");
}

// menú
function toggleMenu(){
  const menu=document.getElementById("menu");
  const btn=document.getElementById("toggleBtn");

  menu.classList.toggle("hidden");

  if(menu.classList.contains("hidden")){
    btn.innerText="➡️";
    btn.style.left="10px";
  }else{
    btn.innerText="⬅️";
    btn.style.left="120px";
  }
}

// chat
function toggleChat(){
  const chat=document.getElementById("chat");
  const btn=document.getElementById("chatToggle");

  chat.classList.toggle("hidden");

  if(chat.classList.contains("hidden")){
    btn.innerText="➡️💬";
  }else{
    btn.innerText="💬";
  }
}

</script>

</body>
</html>
